name: Humanistic LMS Backend Deployment

on:
  push:
    branches:
      - deploy

jobs:
  build-and-deploy:
    name: Build and deploy on VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Copy project to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: '.'
          target: ${{ secrets.VPS_DESTINATION_PATH }}
          rm: true
          recursive: true
          strip_components: 0
          exclude: |
            .github
            node_modules
            .git
            .gitignore
            README.md

      - name: Install production dependencies on VPS and restart service
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            cd ${{ secrets.VPS_DESTINATION_PATH }}
            npm install --production
            npm run build
            if command -v pm2 >/dev/null 2>&1; then
              pm2 restart lms-backend || pm2 start npm --name lms-backend -- start
            else
              echo 'PM2 not installed on VPS. Please start the app manually.'
            fi
