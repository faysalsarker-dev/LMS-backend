name: Humanistic LMS Backend Deployment

on:
  push:
    branches:
      - deploy

jobs:
  build-and-deploy:
    name: Build and deploy on VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies and Build
        run: |
          npm install
          npm run build

      - name: Copy Build to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          # We only send the compiled JS and dependency lists
          source: "dist/,package.json,package-lock.json,ecosystem.config.js" 
          target: ${{ secrets.VPS_DESTINATION_PATH }}
          rm: true

      - name: Production Install and PM2 Restart
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            cd ${{ secrets.VPS_DESTINATION_PATH }}
            # Install only production libs (much lighter on RAM)
            npm install --production 
            # Restart the app
            pm2 restart humanistic-backend || pm2 start dist/server.js --name humanistic-backend